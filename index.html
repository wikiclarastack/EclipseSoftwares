<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Eclipse Softwares | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#a855f7',
                        eclipseDark: '#050505',
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: #fff; 
            margin: 0;
            overflow-x: hidden;
        }

        #eclipse-intro {
            position: fixed;
            inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 1s cubic-bezier(0.87, 0, 0.13, 1);
        }

        .corona { width: 180px; height: 180px; background: #fff; border-radius: 50%; box-shadow: 0 0 100px 20px rgba(168, 85, 247, 0.8); position: relative; }
        .moon-mask { width: 185px; height: 185px; background: #000; border-radius: 50%; position: absolute; transform: translateX(-250%); animation: total-eclipse 3.5s forwards; }
        @keyframes total-eclipse { 0% { transform: translateX(-250%); } 50% { transform: translateX(0%); } 100% { transform: translateX(250%); } }

        .glow-orb { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: -1; }
        .glass-panel { background: rgba(10, 10, 12, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(168, 85, 247, 0.15); }
        .hidden-section { display: none !important; }

        #notification-container { position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; }
        .toast { padding: 16px 24px; border-radius: 12px; background: rgba(15, 15, 18, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div id="eclipse-intro">
        <div class="corona">
            <div class="moon-mask"></div>
        </div>
    </div>

    <div id="cursor-glow" class="glow-orb"></div>

    <div id="landing-page" class="relative z-10">
        <section class="min-h-screen flex flex-col items-center justify-center text-center">
            <h1 class="text-8xl font-black uppercase tracking-tighter mb-8">Eclipse</h1>
            <button onclick="openAuth()" class="bg-primary px-12 py-5 rounded-2xl font-black">ENTRAR NO SISTEMA</button>
        </section>
    </div>

    <div id="auth-modal" class="hidden-section fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="glass-panel w-full max-w-md p-10 rounded-[2.5rem] relative">
            <button onclick="closeAuth()" class="absolute top-6 right-6 text-zinc-500">X</button>
            <h2 class="text-2xl font-black mb-8 uppercase">Login</h2>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                <input id="password" type="password" placeholder="Senha" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                <button onclick="signIn()" class="w-full bg-primary py-4 rounded-xl font-black">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="dashboard-page" class="hidden-section relative z-10 p-10 pt-32 min-h-screen">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-12">
                <h2 class="text-4xl font-black">OLÁ, <span id="user-display" class="text-primary uppercase"></span></h2>
                <div class="flex gap-4">
                    <button id="admin-btn" onclick="toggleAdminView()" class="hidden-section bg-white text-black px-6 py-2 rounded-xl font-bold text-xs">PAINEL ADMIN</button>
                    <button onclick="signOut()" class="bg-red-500/10 text-red-500 px-6 py-2 rounded-xl font-bold text-xs">SAIR</button>
                </div>
            </div>

            <div id="client-area" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass-panel p-8 rounded-3xl">
                    <h3 class="font-bold mb-4 uppercase">Resgatar Licença</h3>
                    <div class="flex gap-2">
                        <input id="license-key" type="text" placeholder="ECLIPSE-XXXX" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-xl">
                        <button class="bg-primary px-6 rounded-xl font-bold">OK</button>
                    </div>
                </div>
            </div>

            <div id="admin-area" class="hidden-section glass-panel p-10 rounded-3xl">
                <h3 class="text-2xl font-black text-primary mb-6 uppercase">Gerador de Keys</h3>
                <div class="flex gap-4">
                    <input id="days" type="number" placeholder="Dias" class="bg-white/5 border border-white/10 p-4 rounded-xl w-32">
                    <button onclick="createKey()" class="bg-primary px-10 py-4 rounded-xl font-black uppercase">Gerar Nova Key</button>
                </div>
                <div id="key-result" class="mt-6 p-4 bg-black rounded-xl font-mono text-primary text-center hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://dfplxmdhstpnptlmopyv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmcGx4bWRoc3RwbnB0bG1vcHl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODgxODksImV4cCI6MjA4ODE2NDE4OX0.ZKQx1ZL3HOSRHwltgD6Sc2Uf1dfPaumb0UpawN3N8ZQ';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showToast(msg, type = 'success') {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `toast border-l-4 ${type === 'success' ? 'border-primary' : 'border-red-500'}`;
            toast.innerHTML = `<span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function openAuth() { document.getElementById('auth-modal').classList.remove('hidden-section'); }
        function closeAuth() { document.getElementById('auth-modal').classList.add('hidden-section'); }
        function toggleAdminView() {
            document.getElementById('client-area').classList.toggle('hidden-section');
            document.getElementById('admin-area').classList.toggle('hidden-section');
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) showToast(error.message, 'error'); else location.reload();
        }

        async function signOut() { await supabaseClient.auth.signOut(); location.reload(); }

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('landing-page').classList.add('hidden-section');
                document.getElementById('dashboard-page').classList.remove('hidden-section');
                document.getElementById('user-display').innerText = user.email.split('@')[0];

                const { data: profile } = await supabaseClient.from('profiles').select('is_admin').eq('id', user.id).single();
                if (profile && profile.is_admin) {
                    document.getElementById('admin-btn').classList.remove('hidden-section');
                }
            }
        }

        async function createKey() {
            const days = document.getElementById('days').value || 30;
            const key = 'ECLIPSE-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            const { error } = await supabaseClient.from('license_keys').insert([{ key_code: key, duration_days: days }]);
            if (error) {
                showToast(error.message, 'error');
            } else {
                const res = document.getElementById('key-result');
                res.innerText = key;
                res.classList.remove('hidden');
                showToast('Key Gerada!');
            }
        }

        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('eclipse-intro').style.opacity = '0'; }, 3500);
            checkUser();
        });

        document.addEventListener('mousemove', (e) => {
            const glow = document.getElementById('cursor-glow');
            glow.style.left = e.clientX - 200 + 'px';
            glow.style.top = e.clientY - 200 + 'px';
        });
    </script>
</body>
</html>
