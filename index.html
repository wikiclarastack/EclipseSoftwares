<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Eclipse Softwares | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #020202 !important; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }
        .tab-btn.active { background: rgba(168, 85, 247, 0.1); border-left: 4px solid #a855f7; color: #fff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 16px 24px; border-radius: 12px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); z-index: 9999; animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .bg-glow { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; height: 100%; pointer-events: none; z-index: -1; background: radial-gradient(circle at 50% -20%, rgba(168, 85, 247, 0.15) 0%, transparent 50%); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div id="notification-container"></div>
    <div id="login-screen" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-8">
            <h1 class="text-6xl font-black tracking-tighter uppercase mb-2 italic">ECLIPSE <span class="text-purple-600">SOFTWARES</span></h1>
        </div>
        <div class="glass w-full max-w-[380px] p-8 rounded-[2rem] border-purple-500/20">
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="E-mail" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-600 font-bold text-sm">
                <input id="auth-password" type="password" placeholder="Senha" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-600 font-bold text-sm">
                <div class="flex flex-col gap-3 pt-2">
                    <button onclick="handleAuth('login')" class="w-full bg-purple-600 py-4 rounded-xl font-black uppercase text-xs hover:bg-purple-500 transition-all">Entrar</button>
                    <button onclick="handleAuth('signup')" class="w-full border border-white/10 py-4 rounded-xl font-black uppercase text-xs hover:bg-white/10 transition-all">Registrar</button>
                </div>
            </div>
        </div>
    </div>
    <div id="main-dashboard" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-80 border-r border-white/5 p-8 flex flex-col glass">
            <div class="flex items-center gap-4 mb-12 p-3 bg-white/5 rounded-2xl">
                <div class="w-12 h-12 rounded-xl bg-purple-600 flex items-center justify-center font-black" id="user-initial">E</div>
                <div>
                    <div id="user-display" class="font-black text-white uppercase text-sm">...</div>
                </div>
            </div>
            <nav class="space-y-2 flex-1">
                <button onclick="switchTab('tab-home', this)" class="tab-btn active w-full flex items-center gap-4 p-4 rounded-xl text-zinc-500 font-bold">DASHBOARD</button>
                <button onclick="switchTab('tab-license', this)" class="tab-btn w-full flex items-center gap-4 p-4 rounded-xl text-zinc-500 font-bold">LICENÇA</button>
                <button onclick="switchTab('tab-admin', this)" id="admin-menu" class="hidden tab-btn w-full flex items-center gap-4 p-4 rounded-xl text-red-500/50 font-bold">ADMIN</button>
            </nav>
            <button onclick="logout()" class="p-4 border border-white/5 rounded-xl text-zinc-500 font-bold hover:text-red-500">SAIR</button>
        </aside>
        <main class="flex-1 p-8 md:p-16">
            <div id="tab-home" class="tab-content active">
                <h1 class="text-5xl font-black mb-10 tracking-tighter uppercase italic">Eclipse <span class="text-purple-600">Softwares</span></h1>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass p-8 rounded-[2rem]">
                        <h3 class="text-zinc-500 font-bold mb-4 uppercase text-[10px]">Vincular Roblox</h3>
                        <div id="roblox-status" class="text-xl font-black mb-6 text-red-500 uppercase italic">Desconectado</div>
                        <input id="roblox-id-input" type="text" placeholder="ID Roblox" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 outline-none text-sm font-bold">
                        <button onclick="syncRoblox()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-xs">Vincular</button>
                    </div>
                </div>
            </div>
            <div id="tab-license" class="tab-content">
                <h1 class="text-4xl font-black mb-10 uppercase">Ativar Key</h1>
                <div class="glass p-10 rounded-[2.5rem] max-w-xl">
                    <input id="license-key-input" type="text" placeholder="ECLIPSE-XXXX" class="w-full bg-white/5 border border-white/10 p-5 rounded-xl text-center font-mono text-xl uppercase mb-4">
                    <button onclick="redeem()" class="w-full bg-purple-600 py-5 rounded-xl font-black uppercase">Ativar</button>
                </div>
            </div>
            <div id="tab-admin" class="tab-content">
                <h1 class="text-4xl font-black mb-10 text-red-500 uppercase">Gerenciar</h1>
                <div class="glass p-10 rounded-[2.5rem] max-w-xl">
                    <input id="days-count" type="number" value="30" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 text-center font-bold">
                    <button onclick="createKey()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase">Gerar Key</button>
                    <div id="key-output" onclick="copyKey()" class="mt-4 p-6 bg-purple-600/10 border-2 border-dashed border-purple-600/30 rounded-xl font-mono text-center text-purple-500 font-black hidden cursor-pointer"></div>
                </div>
            </div>
        </main>
    </div>
    <script>
        const S_URL = "https://dfplxmdhstpnptlmopyv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmcGx4mWRoc3RwbnB0bG1vcHl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODgxODksImV4cCI6MjA4ODE2NDE4OX0.ZKQx1ZL3HOSRHwltgD6Sc2Uf1dfPaumb0UpawN3N8ZQ";
        const client = window.supabase.createClient(S_URL, S_KEY);
        function showMsg(m, isErr = false) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeft = isErr ? '4px solid #ef4444' : '4px solid #a855f7';
            toast.innerHTML = `<span class="font-bold text-xs uppercase">${m}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        async function handleAuth(mode) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return showMsg("Preencha tudo", true);
            const { error } = mode === 'signup' ? await client.auth.signUp({email, password}) : await client.auth.signInWithPassword({email, password});
            if(error) showMsg(error.message, true);
            else checkUser();
        }
        async function checkUser() {
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                document.getElementById('user-display').innerText = session.user.email.split('@')[0];
                document.getElementById('user-initial').innerText = session.user.email[0].toUpperCase();
                const { data: p } = await client.from('profiles').select('*').eq('id', session.user.id).single();
                if (p) {
                    if (p.is_admin) document.getElementById('admin-menu').classList.remove('hidden');
                    if (p.roblox_id) {
                        document.getElementById('roblox-status').innerText = 'ID: ' + p.roblox_id;
                        document.getElementById('roblox-status').classList.replace('text-red-500', 'text-green-500');
                    }
                } else {
                    await client.from('profiles').insert([{ id: session.user.id, username: session.user.email.split('@')[0] }]);
                }
            }
        }
        async function logout() { await client.auth.signOut(); location.reload(); }
        async function syncRoblox() {
            const { data: { user } } = await client.auth.getUser();
            const val = document.getElementById('roblox-id-input').value;
            await client.from('profiles').update({ roblox_id: val }).eq('id', user.id);
            location.reload();
        }
        async function createKey() {
            const k = 'ECLIPSE-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            await client.from('license_keys').insert([{ key_code: k, duration_days: document.getElementById('days-count').value }]);
            document.getElementById('key-output').innerText = k;
            document.getElementById('key-output').classList.remove('hidden');
        }
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        window.onload = checkUser;
    </script>
</body>
</html>
