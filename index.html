<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Eclipse Softwares | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #020202 !important; color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }
        .tab-btn.active { background: rgba(168, 85, 247, 0.1); border-left: 4px solid #a855f7; color: #fff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 16px 24px; border-radius: 12px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); z-index: 9999; animation: slideIn 0.3s ease forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .bg-glow { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; height: 100%; pointer-events: none; z-index: -1; background: radial-gradient(circle at 50% -20%, rgba(168, 85, 247, 0.15) 0%, transparent 50%); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div id="notification-container"></div>

    <div id="login-screen" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-8">
            <h1 class="text-6xl font-black tracking-tighter uppercase mb-2 italic">ECLIPSE <span class="text-purple-600">SOFTWARES</span></h1>
            <p class="text-zinc-500 text-sm font-bold uppercase tracking-widest">Painel de Controle</p>
        </div>

        <div class="glass w-full max-w-[400px] p-8 rounded-[2rem] border-purple-500/20 shadow-2xl">
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Seu e-mail" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-600 font-bold text-sm">
                <input id="auth-password" type="password" placeholder="Sua senha" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-600 font-bold text-sm">
                
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button onclick="handleAuth('login')" class="bg-purple-600 py-4 rounded-xl font-black uppercase text-xs hover:bg-purple-500 transition-all">Entrar</button>
                    <button onclick="handleAuth('signup')" class="border border-white/10 py-4 rounded-xl font-black uppercase text-xs hover:bg-white/10 transition-all">Registrar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-dashboard" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-80 border-r border-white/5 p-8 flex flex-col glass">
            <div class="flex items-center gap-4 mb-12 p-3 bg-white/5 rounded-2xl">
                <div class="w-12 h-12 rounded-xl bg-purple-600 flex items-center justify-center font-black text-xl" id="user-initial">E</div>
                <div class="overflow-hidden">
                    <div id="user-display" class="font-black text-white uppercase truncate text-sm">Carregando...</div>
                    <div id="user-role" class="text-[9px] text-zinc-500 font-black uppercase">Usuário</div>
                </div>
            </div>

            <nav class="space-y-2 flex-1">
                <button onclick="switchTab('tab-home', this)" class="tab-btn active w-full flex items-center gap-4 p-4 rounded-xl text-zinc-500 font-bold hover:text-white transition-all">
                    <i class="ri-dashboard-3-line"></i> DASHBOARD
                </button>
                <button onclick="switchTab('tab-license', this)" class="tab-btn w-full flex items-center gap-4 p-4 rounded-xl text-zinc-500 font-bold hover:text-white transition-all">
                    <i class="ri-key-2-line"></i> LICENÇA
                </button>
                <button onclick="switchTab('tab-admin', this)" id="admin-menu" class="hidden tab-btn w-full flex items-center gap-4 p-4 rounded-xl text-red-500/50 font-bold hover:text-red-500 transition-all">
                    <i class="ri-shield-user-line"></i> ADMIN
                </button>
            </nav>

            <button onclick="logout()" class="p-4 mt-8 border border-white/5 rounded-xl text-zinc-500 font-bold hover:text-red-500 transition-all flex items-center justify-center gap-2">
                <i class="ri-logout-box-r-line"></i> DESLOGAR
            </button>
        </aside>

        <main class="flex-1 p-8 md:p-16">
            <div id="tab-home" class="tab-content active">
                <h1 class="text-5xl font-black mb-10 tracking-tighter uppercase">Eclipse <span class="text-purple-600">Softwares</span></h1>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass p-8 rounded-[2rem]">
                        <h3 class="text-zinc-500 font-bold mb-4 uppercase text-xs tracking-widest">Roblox Link</h3>
                        <div id="roblox-status" class="text-xl font-black mb-6 text-red-500 uppercase italic">Desconectado</div>
                        <input id="roblox-id-input" type="text" placeholder="Insira seu ID" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-purple-600 text-sm font-bold">
                        <button onclick="syncRoblox()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-xs hover:bg-purple-600 hover:text-white transition-all">Vincular</button>
                    </div>
                    <div class="glass p-8 rounded-[2rem]">
                        <h3 class="text-zinc-500 font-bold mb-4 uppercase text-xs tracking-widest">Acesso</h3>
                        <div id="access-status" class="text-xl font-black mb-6 text-red-500 uppercase italic">Sem Assinatura</div>
                        <button class="w-full bg-white/5 border border-white/10 py-4 rounded-xl font-black text-center text-xs uppercase cursor-default">Status: Off</button>
                    </div>
                </div>
            </div>

            <div id="tab-license" class="tab-content">
                <h1 class="text-4xl font-black mb-10 uppercase italic">Ativar <span class="text-purple-600">Acesso</span></h1>
                <div class="glass p-10 rounded-[2.5rem] max-w-xl">
                    <input id="license-key-input" type="text" placeholder="DIGITE SUA KEY" class="w-full bg-white/5 border border-white/10 p-5 rounded-xl outline-none focus:border-purple-600 mb-4 text-center font-mono text-xl uppercase">
                    <button onclick="redeem()" class="w-full bg-purple-600 py-5 rounded-xl font-black uppercase tracking-widest">Validar Key</button>
                </div>
            </div>

            <div id="tab-admin" class="tab-content">
                <h1 class="text-4xl font-black mb-10 text-red-500 uppercase">Gerenciar Keys</h1>
                <div class="glass p-10 rounded-[2.5rem] max-w-xl">
                    <div class="flex gap-4 mb-6">
                        <input id="days-count" type="number" value="30" class="w-24 bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-center font-bold">
                        <button onclick="createKey()" class="flex-1 bg-white text-black py-4 rounded-xl font-black uppercase text-sm">Gerar Nova Key</button>
                    </div>
                    <div id="key-output" onclick="copyKey()" class="p-6 bg-purple-600/10 border-2 border-dashed border-purple-600/30 rounded-xl font-mono text-center text-purple-500 font-black text-lg hidden cursor-pointer"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const S_URL = "https://dfplxmdhstpnptlmopyv.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmcGx4mWRoc3RwbnB0bG1vcHl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODgxODksImV4cCI6MjA4ODE2NDE4OX0.ZKQx1ZL3HOSRHwltgD6Sc2Uf1dfPaumb0UpawN3N8ZQ";
        const client = window.supabase.createClient(S_URL, S_KEY);

        function showMsg(m, isErr = false) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeft = isErr ? '4px solid #ef4444' : '4px solid #a855f7';
            toast.innerHTML = `<span class="font-bold text-sm uppercase">${m}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function handleAuth(mode) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return showMsg("Preencha tudo", true);

            if(mode === 'signup') {
                const { data, error } = await client.auth.signUp({ email, password });
                if(error) showMsg(error.message, true);
                else {
                    showMsg("Conta criada! Tente logar.");
                }
            } else {
                const { data, error } = await client.auth.signInWithPassword({ email, password });
                if(error) showMsg("Erro: " + error.message, true);
                else checkUser();
            }
        }

        async function logout() {
            await client.auth.signOut();
            location.reload();
        }

        async function checkUser() {
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                const user = session.user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.split('@')[0];
                document.getElementById('user-initial').innerText = user.email[0].toUpperCase();

                const { data: prof } = await client.from('profiles').select('*').eq('id', user.id).single();
                if (prof) {
                    if (prof.is_admin) document.getElementById('admin-menu').classList.remove('hidden');
                    if (prof.has_access) {
                        document.getElementById('access-status').innerText = 'ATIVO';
                        document.getElementById('access-status').classList.replace('text-red-500', 'text-green-500');
                        document.getElementById('user-role').innerText = 'VIP';
                        document.getElementById('user-role').classList.replace('text-zinc-500', 'text-purple-500');
                    }
                    if (prof.roblox_id) {
                        document.getElementById('roblox-status').innerText = 'ID: ' + prof.roblox_id;
                        document.getElementById('roblox-status').classList.replace('text-red-500', 'text-green-500');
                    }
                } else {
                    await client.from('profiles').insert([{ id: user.id, username: user.email.split('@')[0] }]);
                }
            }
        }

        async function syncRoblox() {
            const { data: { user } } = await client.auth.getUser();
            const id = document.getElementById('roblox-id-input').value;
            if (!id || isNaN(id)) return showMsg("ID Inválido", true);
            await client.from('profiles').update({ roblox_id: id }).eq('id', user.id);
            showMsg("Sincronizado!");
            setTimeout(() => location.reload(), 500);
        }

        async function redeem() {
            const { data: { user } } = await client.auth.getUser();
            const key = document.getElementById('license-key-input').value;
            const { data: kData } = await client.from('license_keys').select('*').eq('key_code', key).is('used_by', null).single();
            if (!kData) return showMsg("Key Inválida", true);
            await client.from('license_keys').update({ used_by: user.id, used_at: new Date() }).eq('id', kData.id);
            await client.from('profiles').update({ has_access: true }).eq('id', user.id);
            showMsg("Acesso Liberado!");
            setTimeout(() => location.reload(), 500);
        }

        async function createKey() {
            const k = 'ECLIPSE-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            const d = document.getElementById('days-count').value;
            await client.from('license_keys').insert([{ key_code: k, duration_days: d }]);
            const out = document.getElementById('key-output');
            out.innerText = k;
            out.classList.remove('hidden');
            showMsg("Key Gerada!");
        }

        function copyKey() {
            navigator.clipboard.writeText(document.getElementById('key-output').innerText);
            showMsg("Copiado!");
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = checkUser;
    </script>
</body>
</html>
