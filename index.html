<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Eclipse Softwares | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            background-color: #020202 !important; 
            color: #ffffff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass { 
            background: rgba(15, 15, 15, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass:hover { border-color: rgba(168, 85, 247, 0.3); }

        .tab-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; }
        .tab-content.active { display: block; opacity: 1; transform: translateY(0); }

        .tab-btn { position: relative; transition: all 0.3s ease; }
        .tab-btn.active { 
            background: rgba(168, 85, 247, 0.1); 
            color: #fff; 
        }
        .tab-btn.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background: #a855f7;
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 15px #a855f7;
        }

        #notification-container { 
            position: fixed; 
            bottom: 24px; 
            right: 24px; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .toast { 
            padding: 16px 24px; 
            border-radius: 16px; 
            background: rgba(10, 10, 10, 0.9); 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        @keyframes slideIn { 
            from { transform: translateX(120%); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        input { transition: all 0.3s ease; }
        input:focus { box-shadow: 0 0 20px rgba(168, 85, 247, 0.1); }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            background: #a855f7;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.2);
        }

        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div id="notification-container"></div>

    <div id="login-screen" class="min-h-screen flex flex-col items-center justify-center p-6 text-center fade-in">
        <div class="mb-12">
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter uppercase mb-4 italic">
                ECLIPSE <span class="text-purple-600">SOFTWARES</span>
            </h1>
            <p class="text-zinc-500 text-lg font-bold uppercase tracking-widest opacity-80">The Ultimate Injectable Skill</p>
        </div>

        <div class="glass w-full max-w-[440px] p-10 rounded-[2.5rem] border-purple-500/20 shadow-2xl">
            <button id="discord-login-btn" class="w-full bg-[#5865F2] py-5 rounded-2xl font-black uppercase flex items-center justify-center gap-3 hover:bg-[#4752c4] transition-all transform hover:scale-[1.03] active:scale-[0.98]">
                <i class="ri-discord-fill text-3xl"></i>
                Entrar com Discord
            </button>
            <p class="text-[10px] text-zinc-600 font-bold uppercase mt-6 tracking-widest">Painel de Controle v3.0</p>
        </div>
    </div>

    <div id="main-dashboard" class="hidden min-h-screen flex flex-col md:flex-row fade-in">
        <aside class="w-full md:w-80 border-r border-white/5 p-8 flex flex-col glass">
            <div class="flex items-center gap-4 mb-12 p-4 bg-white/5 rounded-2xl border border-white/5">
                <img id="user-avatar" src="" class="w-12 h-12 rounded-xl border border-purple-600/50 shadow-lg shadow-purple-600/20">
                <div class="overflow-hidden">
                    <div id="user-display" class="font-black text-white uppercase truncate text-sm tracking-tight">Usuário</div>
                    <div id="user-tier" class="text-[9px] text-zinc-500 font-black uppercase tracking-tighter">Membro Comum</div>
                </div>
            </div>

            <nav class="space-y-2 flex-1">
                <button onclick="switchTab('tab-home', this)" class="tab-btn active w-full flex items-center gap-4 p-4 rounded-xl text-zinc-500 font-bold hover:text-white transition-all">
                    <i class="ri-dashboard-3-line"></i> DASHBOARD
                </button>
                <button onclick="switchTab('tab-license', this)" class="tab-btn w-full flex items-center gap-4 p-4 rounded-xl text-zinc-500 font-bold hover:text-white transition-all">
                    <i class="ri-key-2-line"></i> LICENÇA
                </button>
                <button onclick="switchTab('tab-admin', this)" id="admin-menu" class="hidden tab-btn w-full flex items-center gap-4 p-4 rounded-xl text-red-500/50 font-bold hover:text-red-500 transition-all">
                    <i class="ri-shield-user-line"></i> ADMINISTRAÇÃO
                </button>
            </nav>

            <button id="logout-btn" class="p-4 mt-8 border border-white/5 rounded-xl text-zinc-500 font-bold hover:bg-red-500/10 hover:text-red-500 transition-all flex items-center justify-center gap-2">
                <i class="ri-logout-box-r-line"></i> DESLOGAR
            </button>
        </aside>

        <main class="flex-1 p-8 md:p-16 overflow-y-auto">
            <div id="tab-home" class="tab-content active">
                <h1 class="text-5xl font-black mb-10 tracking-tighter uppercase italic">Painel <span class="text-purple-600">Eclipse</span></h1>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="glass p-8 rounded-[2.5rem]">
                        <h3 class="text-zinc-500 font-bold mb-4 uppercase text-xs tracking-widest">Conta Roblox</h3>
                        <div id="roblox-status" class="text-xl font-black mb-6 text-red-500 uppercase flex items-center gap-2">
                            <i class="ri-error-warning-line"></i> Não Vinculado
                        </div>
                        <input id="roblox-id-input" type="text" placeholder="ID do Roblox" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-purple-600 text-sm font-bold">
                        <button id="sync-roblox-btn" class="w-full btn-primary py-4 rounded-xl font-black uppercase text-xs">Sincronizar ID</button>
                    </div>
                    
                    <div class="glass p-8 rounded-[2.5rem]">
                        <h3 class="text-zinc-500 font-bold mb-4 uppercase text-xs tracking-widest">Status do Script</h3>
                        <div id="access-status" class="text-xl font-black mb-6 text-red-500 uppercase flex items-center gap-2">
                            <i class="ri-lock-line"></i> Assinatura Inativa
                        </div>
                        <a href="https://discord.gg/yHN3P4BVNc" target="_blank" class="block w-full bg-purple-600 py-4 rounded-xl font-black text-center text-xs uppercase hover:bg-purple-500 transition-all shadow-lg shadow-purple-600/20">Comprar Acesso</a>
                    </div>
                </div>
            </div>

            <div id="tab-license" class="tab-content">
                <h1 class="text-4xl font-black mb-10 uppercase italic">Ativar <span class="text-purple-600">Produto</span></h1>
                <div class="glass p-10 rounded-[2.5rem] max-w-xl">
                    <input id="license-key-input" type="text" placeholder="ECLIPSE-XXXX" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-purple-600 mb-6 text-center font-mono text-2xl uppercase tracking-widest">
                    <button id="redeem-key-btn" class="w-full bg-purple-600 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-purple-500 transition-all shadow-lg shadow-purple-600/30 text-sm">Resgatar Agora</button>
                </div>
            </div>

            <div id="tab-admin" class="tab-content">
                <h1 class="text-4xl font-black mb-10 text-red-500 uppercase italic">Gerenciador Master</h1>
                <div class="glass p-10 rounded-[2.5rem] max-w-xl border-red-500/10">
                    <div class="flex gap-4 mb-6">
                        <input id="days-count" type="number" value="30" class="w-24 bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-center font-bold">
                        <button id="create-key-btn" class="flex-1 btn-primary py-4 rounded-xl font-black uppercase text-xs">Gerar Nova Key</button>
                    </div>
                    <div id="key-output-container" class="hidden">
                        <p class="text-[10px] text-zinc-500 font-bold uppercase mb-2 text-center">Clique para copiar</p>
                        <div id="key-output" class="p-6 bg-purple-600/10 border-2 border-dashed border-purple-600/30 rounded-xl font-mono text-center text-purple-500 font-black text-lg cursor-pointer hover:bg-purple-600/20 transition-all"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://dfplxmdhstpnptlmopyv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmcGx4mWRoc3RwbnB0bG1vcHl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODgxODksImV4cCI6MjA4ODE2NDE4OX0.ZKQx1ZL3HOSRHwltgD6Sc2Uf1dfPaumb0UpawN3N8ZQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function showToast(msg, type = 'success') {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeft = type === 'success' ? '4px solid #a855f7' : '4px solid #ef4444';
            toast.innerHTML = `<div class="flex items-center gap-3">
                <i class="${type === 'success' ? 'ri-checkbox-circle-fill text-purple-500' : 'ri-error-warning-fill text-red-500'} text-xl"></i>
                <span class="font-bold text-sm uppercase tracking-tight">${msg}</span>
            </div>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100px)';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        async function initAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) renderDashboard(session.user);
            
            document.getElementById('discord-login-btn').onclick = () => {
                supabase.auth.signInWithOAuth({ provider: 'discord', options: { redirectTo: window.location.origin } });
            };

            document.getElementById('logout-btn').onclick = async () => {
                await supabase.auth.signOut();
                location.reload();
            };
        }

        async function renderDashboard(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            
            const meta = user.user_metadata;
            document.getElementById('user-display').innerText = meta.full_name || "Usuário";
            document.getElementById('user-avatar').src = meta.avatar_url;

            let { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            
            if (!profile) {
                const { data } = await supabase.from('profiles').insert([{ 
                    id: user.id, 
                    username: meta.full_name, 
                    avatar_url: meta.avatar_url,
                    has_access: false 
                }]).select().single();
                profile = data;
            }

            if (profile.is_admin) document.getElementById('admin-menu').classList.remove('hidden');
            
            if (profile.has_access) {
                const acc = document.getElementById('access-status');
                acc.innerHTML = '<i class="ri-shield-check-line"></i> Assinatura Ativa';
                acc.classList.replace('text-red-500', 'text-green-500');
                document.getElementById('user-tier').innerText = "Assinante Eclipse";
                document.getElementById('user-tier').classList.replace('text-zinc-500', 'text-purple-500');
            }

            if (profile.roblox_id) {
                const rbx = document.getElementById('roblox-status');
                rbx.innerHTML = `<i class="ri-robot-line"></i> ID: ${profile.roblox_id}`;
                rbx.classList.replace('text-red-500', 'text-green-500');
            }

            setupActions(user);
        }

        function setupActions(user) {
            document.getElementById('sync-roblox-btn').onclick = async () => {
                const val = document.getElementById('roblox-id-input').value;
                if (!val || isNaN(val)) return showToast("Digite um ID numérico", "error");
                
                const { error } = await supabase.from('profiles').update({ 
                    roblox_id: val,
                    username: user.user_metadata.full_name,
                    avatar_url: user.user_metadata.avatar_url 
                }).eq('id', user.id);
                
                if (error) showToast(error.message, 'error');
                else { showToast("ID Sincronizado!"); setTimeout(() => location.reload(), 800); }
            };

            document.getElementById('redeem-key-btn').onclick = async () => {
                const k = document.getElementById('license-key-input').value;
                const { data: kData } = await supabase.from('license_keys').select('*').eq('key_code', k).is('used_by', null).single();

                if (!kData) return showToast("Key inválida ou usada", "error");

                await supabase.from('license_keys').update({ used_by: user.id, used_at: new Date() }).eq('id', kData.id);
                await supabase.from('profiles').update({ has_access: true }).eq('id', user.id);
                
                showToast("Acesso Liberado!");
                setTimeout(() => location.reload(), 1000);
            };

            document.getElementById('create-key-btn').onclick = async () => {
                const key = 'ECLIPSE-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                const days = document.getElementById('days-count').value;
                const { error } = await supabase.from('license_keys').insert([{ key_code: key, duration_days: days }]);
                
                if (error) showToast(error.message, 'error');
                else {
                    const out = document.getElementById('key-output');
                    out.innerText = key;
                    document.getElementById('key-output-container').classList.remove('hidden');
                    showToast("Key Gerada com Sucesso!");
                }
            };

            document.getElementById('key-output').onclick = function() {
                navigator.clipboard.writeText(this.innerText);
                showToast("Key Copiada!");
            };
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        window.onload = initAuth;
    </script>
</body>
</html>
