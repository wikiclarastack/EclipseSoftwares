<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Eclipse | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #020202; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div id="login-screen" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black mb-12 uppercase italic">ECLIPSE <span class="text-purple-600">SOFTWARES</span></h1>
        <div class="glass w-full max-w-[400px] p-10 rounded-[2.5rem]">
            <button id="btn-discord" class="w-full bg-[#5865F2] py-5 rounded-2xl font-black uppercase flex items-center justify-center gap-3">
                <i class="ri-discord-fill text-3xl"></i> Entrar com Discord
            </button>
        </div>
    </div>

    <div id="main-dashboard" class="hidden min-h-screen flex">
        <main class="flex-1 p-16">
            <h1 class="text-5xl font-black mb-10">PAINEL <span class="text-purple-600">ECLIPSE</span></h1>
            <div class="glass p-8 rounded-[2rem] max-w-md">
                <h3 class="text-zinc-500 font-bold mb-4 uppercase text-xs">Roblox ID</h3>
                <div id="roblox-status" class="text-xl font-black mb-6 text-red-500">NÃO VINCULADO</div>
                <input id="roblox-id-input" type="text" placeholder="ID do Roblox" class="w-full bg-white/5 p-4 rounded-xl mb-4 outline-none border border-white/10">
                <button onclick="updateRobloxID()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase">Sincronizar ID</button>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://dfplxmdhstpnptlmopyv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmcGx4mWRoc3RwbnB0bG1vcHl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODgxODksImV4cCI6MjA4ODE2NDE4OX0.ZKQx1ZL3HOSRHwltgD6Sc2Uf1dfPaumb0UpawN3N8ZQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Define a função ANTES de qualquer clique
        async function signInWithDiscord() {
            console.log("Iniciando login...");
            await supabase.auth.signInWithOAuth({ 
                provider: 'discord', 
                options: { redirectTo: window.location.origin } 
            });
        }

        // Atribui o evento via ID para evitar o erro de "not defined"
        document.getElementById('btn-discord').onclick = signInWithDiscord;

        async function updateRobloxID() {
            const { data: { user } } = await supabase.auth.getUser();
            const rid = document.getElementById('roblox-id-input').value;
            
            // Agora salvando username e avatar para o script Lua usar
            await supabase.from('profiles').update({ 
                roblox_id: rid,
                username: user.user_metadata.full_name,
                avatar_url: user.user_metadata.avatar_url 
            }).eq('id', user.id);
            
            alert("Sincronizado!"); location.reload();
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
